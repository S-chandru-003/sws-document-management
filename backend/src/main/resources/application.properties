# ─────────────────────────────────────────────────────────────────
# SWS AI DMS — Application Configuration
# Copy this file to src/main/resources/application.properties
# and replace the placeholder values with your local environment.
# ─────────────────────────────────────────────────────────────────

# Server
server.port=8080

# ── MySQL ──────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/swsai_dms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── File Storage ──────────────────────────────────────────────────
# Absolute path where uploaded files will be stored on disk.
app.upload.dir=./uploads

# ── Multipart Upload Limits ───────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# ── Async Thread Pool ─────────────────────────────────────────────
app.async.core-pool-size=4
app.async.max-pool-size=8
app.async.queue-capacity=100

# ── CORS (dev) ────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000
